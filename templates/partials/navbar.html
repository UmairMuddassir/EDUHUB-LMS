<nav class="sticky top-0 z-50 glass">
  <div class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3">
    <!-- Brand -->
    <a href="{% url 'courses:dashboard' %}" class="flex items-center gap-2 text-lg font-extrabold tracking-tight">
      <span class="inline-flex h-9 w-9 items-center justify-center rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 text-white shadow-lg shadow-brand-200">
        <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M4.26 10.147a60.438 60.438 0 0 0-.491 6.347A48.62 48.62 0 0 1 12 20.904a48.62 48.62 0 0 1 8.232-4.41 60.46 60.46 0 0 0-.491-6.347m-15.482 0a50.636 50.636 0 0 0-2.658-.813A59.906 59.906 0 0 1 12 3.493a59.903 59.903 0 0 1 10.399 5.84c-.896.248-1.783.52-2.658.814m-15.482 0A50.717 50.717 0 0 1 12 13.489a50.702 50.702 0 0 1 7.74-3.342M6.75 15a.75.75 0 1 0 0-1.5.75.75 0 0 0 0 1.5Zm0 0v-3.675A55.378 55.378 0 0 1 12 8.443m-7.007 11.55A5.981 5.981 0 0 0 6.75 15.75v-1.5"/></svg>
      </span>
      <span class="bg-gradient-to-r from-brand-600 to-brand-800 bg-clip-text text-transparent">EduHub</span>
    </a>

    <!-- Nav Links -->
    <div class="flex items-center gap-3">
      {% if user.is_authenticated %}
        <a href="{% url 'courses:course_list' %}" class="rounded-lg px-3 py-2 text-sm font-medium text-surface-600 transition hover:bg-brand-50 hover:text-brand-700">Browse</a>
        <a href="{% url 'courses:dashboard' %}" class="rounded-lg px-3 py-2 text-sm font-medium text-surface-600 transition hover:bg-brand-50 hover:text-brand-700">Dashboard</a>
        {% if user.is_instructor %}
          <a href="{% url 'courses:course_create' %}" class="btn-primary !py-2 !text-xs">+ New Course</a>
        {% endif %}
        <div class="ml-2 flex items-center gap-2 rounded-xl border border-surface-100 bg-white/70 px-3 py-1.5 text-sm">
          <span class="inline-flex h-7 w-7 items-center justify-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-xs font-bold text-white">
            {{ user.username|make_list|first|upper }}
          </span>
          <span class="font-medium text-surface-700">{{ user.username }}</span>
          <span class="rounded-full bg-brand-100 px-2 py-0.5 text-[10px] font-semibold uppercase tracking-wider text-brand-700">{{ user.role }}</span>
        </div>
        <form method="post" action="{% url 'accounts:logout' %}">
          {% csrf_token %}
          <button type="submit" class="rounded-lg px-3 py-2 text-sm font-medium text-red-500 transition hover:bg-red-50">Logout</button>
        </form>
      {% else %}
        <a href="{% url 'accounts:login' %}" class="btn-secondary !py-2 !text-xs">Sign In</a>
        <a href="{% url 'accounts:register' %}" class="btn-primary !py-2 !text-xs">Get Started</a>
      {% endif %}
    </div>
  </div>
</nav>
