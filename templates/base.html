{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}EduHub{% endblock %} — AI-Powered LMS</title>
  <meta name="description" content="{% block meta_description %}EduHub: An AI-powered Learning Management System for modern education.{% endblock %}">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand:   { 50:'#eef2ff', 100:'#e0e7ff', 200:'#c7d2fe', 300:'#a5b4fc', 400:'#818cf8', 500:'#6366f1', 600:'#4f46e5', 700:'#4338ca', 800:'#3730a3', 900:'#312e81' },
            surface: { 50:'#f8fafc', 100:'#f1f5f9', 200:'#e2e8f0', 700:'#334155', 800:'#1e293b', 900:'#0f172a' },
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    .form-input {
      @apply w-full rounded-xl border border-surface-200 bg-white px-4 py-3 text-sm text-surface-800
             shadow-sm transition focus:border-brand-400 focus:outline-none focus:ring-2 focus:ring-brand-200;
    }
    .btn-primary {
      @apply inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-brand-500 to-brand-600
             px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-brand-200
             transition hover:from-brand-600 hover:to-brand-700 hover:shadow-xl hover:-translate-y-0.5
             focus:outline-none focus:ring-2 focus:ring-brand-300;
    }
    .btn-secondary {
      @apply inline-flex items-center justify-center gap-2 rounded-xl border border-surface-200 bg-white
             px-6 py-3 text-sm font-semibold text-surface-700 shadow-sm
             transition hover:bg-surface-50 hover:shadow hover:-translate-y-0.5
             focus:outline-none focus:ring-2 focus:ring-brand-200;
    }
    .btn-danger {
      @apply inline-flex items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-red-500 to-red-600
             px-6 py-3 text-sm font-semibold text-white shadow-lg shadow-red-200
             transition hover:from-red-600 hover:to-red-700 hover:shadow-xl hover:-translate-y-0.5;
    }
    .card {
      @apply rounded-2xl border border-surface-100 bg-white/80 backdrop-blur-sm p-6 shadow-sm
             transition hover:shadow-lg hover:-translate-y-1;
    }
    .glass {
      @apply bg-white/60 backdrop-blur-xl border border-white/20 shadow-xl;
    }
  </style>
</head>
<body class="h-full bg-gradient-to-br from-surface-50 via-brand-50/30 to-surface-100 font-sans text-surface-800 antialiased">

  {% include "partials/navbar.html" %}

  {% if messages %}
  <div class="mx-auto max-w-7xl px-4 pt-4">
    {% for msg in messages %}
    <div class="mb-3 flex items-center gap-3 rounded-xl border px-5 py-3 text-sm font-medium shadow-sm animate-[fadeIn_0.3s_ease]
      {% if msg.tags == 'success' %} border-emerald-200 bg-emerald-50 text-emerald-700
      {% elif msg.tags == 'error' %}   border-red-200 bg-red-50 text-red-700
      {% elif msg.tags == 'warning' %} border-amber-200 bg-amber-50 text-amber-700
      {% else %}                        border-blue-200 bg-blue-50 text-blue-700
      {% endif %}">
      <span>{{ msg }}</span>
    </div>
    {% endfor %}
  </div>
  {% endif %}

  <main class="mx-auto max-w-7xl px-4 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="mt-auto border-t border-surface-100 bg-white/50 backdrop-blur">
    <div class="mx-auto max-w-7xl px-4 py-6 text-center text-xs text-surface-400">
      &copy; 2026 <span class="font-semibold text-brand-600">EduHub</span> — AI-Powered Learning Management System
    </div>
  </footer>

  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(-8px) } to { opacity:1; transform:translateY(0) } }
  </style>
</body>
</html>
